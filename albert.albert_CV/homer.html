<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homer's Web Page</title>
<style>
body {
  background-color: lightblue;
  font-family: 'Comic Sans MS', cursive, sans-serif;
  text-align: center;
  margin: 0;
}

h1 {
  font-size: 40px;
  font-weight: bold;
  color: black;
  text-shadow: 2px 2px white;
  margin-top: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(3, 150px);
  gap: 20px;
  justify-items: center;
  align-items: center;
  margin-top: 40px;
}

img {
  width: 80px;
  animation: bounce 2s ease-in-out infinite;
}

.center {
  grid-column: 2 / span 2;
  grid-row: 2;
}

.center img {
  width: 180px;
  animation: none;
}

@keyframes bounce {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-20px);
  }
}

/* Tablet view */
@media (max-width: 900px) {
  .grid {
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 120px);
  }

  h1 {
    font-size: 32px;
  }

  img {
    width: 70px;
  }

  .center img {
    width: 150px;
  }
}

/* Mobile view */
@media (max-width: 600px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(6, 100px);
  }

  h1 {
    font-size: 26px;
  }

  img {
    width: 60px;
  }

  .center img {
    width: 130px;
  }
}
</style>
</head>
<body>
<h1>Homer's Web Page</h1>

<div class="grid">
  <img src="https://cdn-icons-png.flaticon.com/512/69/69881.png" alt="alarm clock">
  <img src="https://cdn-icons-png.flaticon.com/512/1123/1123479.png" alt="toaster">
  <img src="https://cdn-icons-png.flaticon.com/512/69/69881.png" alt="alarm clock">
  <img src="https://cdn-icons-png.flaticon.com/512/1123/1123479.png" alt="toaster">
  <img src="https://cdn-icons-png.flaticon.com/512/69/69887.png" alt="bell">
  <img src="https://cdn-icons-png.flaticon.com/512/2589/2589183.png" alt="mouth">
  <div class="center">
    <img src="https://upload.wikimedia.org/wikipedia/en/0/02/Homer_Simpson_2006.png" alt="Homer">
  </div>
  <img src="https://cdn-icons-png.flaticon.com/512/69/69887.png" alt="bell">
  <img src="https://cdn-icons-png.flaticon.com/512/1123/1123479.png" alt="toaster">
  <img src="https://cdn-icons-png.flaticon.com/512/69/69881.png" alt="alarm clock">
  <img src="https://cdn-icons-png.flaticon.com/512/69/69887.png" alt="bell">
  <img src="https://cdn-icons-png.flaticon.com/512/2589/2589183.png" alt="mouth">
</div>
</body>
</html>
